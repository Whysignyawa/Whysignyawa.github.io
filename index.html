<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T40sugS1gn1 | Digital Identity</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; justify-content: center; align-items: flex-start; margin-top: 50px; }
        .section { background: rgba(0, 15, 0, 0.85); border: 1px solid #0f0; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); padding: 25px; width: 350px; position: relative; }
        h2 { text-align: center; color: #fff; text-transform: uppercase; border-bottom: 1px solid #0f0; }
        .value { color: #0f0; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div class="section">
            <h2>Core Identity</h2>
            <p>LEAD: <span class="value">0ff1c14l Ta0h1deforce</span></p>
            <p>ORG: <span class="value">T40sugS1gn1</span></p>
        </div>
        <div class="section">
            <h2>Field Ops</h2>
            <p>AGENT: <span class="value">Niko Ismail (Last)</span></p>
            <p>LOC: <span class="value">Semporna, Sabah</span></p>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
        const fontSize = 16; const columns = canvas.width / fontSize;
        const drops = []; for (let i = 0; i < columns; i++) drops[i] = 1;
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
